entry_node: "data"

nodes:
  - name: "data"
    module: "cas.agents.nodes.data_node"
    fn: "run"
  - name: "feature"
    module: "cas.agents.nodes.feature_node"
    fn: "run"
  - name: "base_prediction"
    module: "cas.agents.nodes.base_prediction_node"
    fn: "run"
  - name: "market_overlay"
    module: "cas.agents.nodes.macro_overlay_node"
    fn: "run"
  - name: "news_overlay"
    module: "cas.agents.nodes.news_overlay_node"
    fn: "run"
  - name: "committee"
    module: "cas.agents.nodes.committee_node"
    fn: "run"
  - name: "report"
    module: "cas.agents.nodes.report_node"
    fn: "run"

edges:
  - [data, feature]
  - [feature, base_prediction]
  - [base_prediction, market_overlay]
  - [market_overlay, news_overlay]
  - [news_overlay, committee]
  - [committee, report]

conditional_edges:
  data:
    condition_fn: "cas.agents.nodes.data_node:has_enough_data"
    mapping:
      "enough": "feature"
      "insufficient": "report"

checkpointer:
  kind: "memory"
  sqlite_path: "./data/interim/langgraph_checkpoints.db"
