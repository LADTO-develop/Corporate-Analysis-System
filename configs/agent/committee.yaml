aggregation:
  confidence_gap: 0.12
  recommendation_thresholds:
    priority: 0.75
    watch: 0.60
    review: 0.45

perspectives:
  - kind: "quality_gate"
    weight: 0.30
    focus_metrics:
      - profitability_score
      - cash_generation_score
      - governance_score
  - kind: "resilience_check"
    weight: 0.30
    focus_metrics:
      - leverage_health_score
      - liquidity_score
      - interest_coverage_score
  - kind: "growth_view"
    weight: 0.20
    focus_metrics:
      - revenue_growth_score
      - product_momentum_score
      - industry_position_score
  - kind: "risk_control"
    weight: 0.20
    focus_metrics:
      - controversy_penalty
      - concentration_health_score
      - qualitative_adjustment
