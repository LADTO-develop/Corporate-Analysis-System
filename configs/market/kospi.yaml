# ---------------------------------------------------------------------------
# KOSPI 시장 설정
#
# KOSPI는 대형·중견 기업 중심으로 한기평/한신평/NICE신용평가의 커버리지가
# 광범위. 등급 분포가 투자적격 쪽으로 치우쳐 있어 클래스 불균형이 KOSDAQ보다
# 강한 편. 피처 스케일 역시 큼(조 단위 매출).
# ---------------------------------------------------------------------------

market: KOSPI

# 이 시장에서 등급을 가장 많이 발급하는 평가사 — normalize.py에서 가중치로 활용
dominant_agencies:
  - 한국기업평가
  - 한국신용평가
  - NICE신용평가

# 피처 서브셋 — 시장별로 의미있는 피처만 선택 가능
feature_subset: "kospi_v1"           # features/registry.py의 서브셋 이름

# 타깃 정의
target:
  kind: "binary"
  positive_class: "borderline"        # 투기등급 (BB+ 이하)
  negative_class: "healthy"           # 투자적격 (BBB- 이상)

# Walk-forward 교차검증 윈도우 (연도 단위)
cv:
  kind: "walk_forward"
  train_years: 5
  val_years: 1
  step_years: 1
  min_train_year: 2015                # 이전 데이터는 스키마 차이로 제외
  gap_years: 0                         # 재무(t) → 등급(t+1) 매핑에 이미 반영됨

# 모델 오버라이드
models:
  tabpfn:
    # 데이터 규모가 TabPFN 권장(50k sample) 한계 근처. subsample 옵션 고려
    ignore_pretraining_limits: false
  lightgbm:
    num_leaves: 63
    learning_rate: 0.05
    n_estimators: 500
    # 클래스 불균형 보정 (투자적격:투기 비율이 대략 9:1)
    is_unbalance: true
  ebm:
    outer_bags: 8
    interactions: 15
