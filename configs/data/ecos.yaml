# ---------------------------------------------------------------------------
# 한국은행 ECOS (경제통계시스템) Open API 설정
# API 발급: https://ecos.bok.or.kr/api/
# ---------------------------------------------------------------------------

api:
  base_url: "https://ecos.bok.or.kr/api"
  api_key_env: "ECOS_API_KEY"
  language: "kr"                    # kr | en
  format: "json"                    # json | xml
  request_timeout_seconds: 30
  # tenacity 재시도 정책
  retry:
    max_attempts: 5
    initial_wait_seconds: 1
    max_wait_seconds: 30
    exponential_base: 2

# ECOS 통계 시리즈 — 거시 피처로 사용할 항목들
# 시리즈 코드와 주기는 ECOS 통계검색에서 확인 가능
series:
  # --- 금리 ----------------------------------------------------------------
  base_rate:
    stat_code: "722Y001"
    item_code: "0101000"            # 한국은행 기준금리
    cycle: "D"                      # 일별
  kofr:
    stat_code: "817Y002"
    item_code: "010150000"          # 콜금리(익일물)
    cycle: "D"
  corp_bond_3y_aa_minus:
    stat_code: "817Y002"
    item_code: "010210000"          # 회사채(3년, AA-)
    cycle: "D"
  corp_bond_3y_bbb_minus:
    stat_code: "817Y002"
    item_code: "010220000"          # 회사채(3년, BBB-)
    cycle: "D"

  # --- 환율 ----------------------------------------------------------------
  usd_krw:
    stat_code: "731Y001"
    item_code: "0000001"
    cycle: "D"

  # --- 실물지표 ------------------------------------------------------------
  cpi:
    stat_code: "901Y009"
    item_code: "0"                   # 총지수
    cycle: "M"
  ppi:
    stat_code: "404Y014"
    item_code: "*AA"
    cycle: "M"
  industrial_production:
    stat_code: "901Y033"
    item_code: "I11AA"
    cycle: "M"
  gdp_real:
    stat_code: "200Y001"
    item_code: "10111"               # 실질 GDP
    cycle: "Q"

# 파생 거시 피처 (macro.py에서 생성)
derived_features:
  - name: "credit_spread_bbb_aa"     # BBB- 와 AA- 금리차 = 신용 스프레드
    formula: "corp_bond_3y_bbb_minus - corp_bond_3y_aa_minus"
  - name: "real_rate"
    formula: "base_rate - cpi_yoy"
  - name: "fx_volatility_30d"
    formula: "rolling_std(log_returns(usd_krw), window=30)"
