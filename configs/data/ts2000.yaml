# ---------------------------------------------------------------------------
# TS2000 재무제표 5본 데이터 설정
#
# TS2000 (FnGuide Pro / NICE Pro 등 상용 DB)는 재무제표를 아래 다섯 파일로
# 내보내는 관례가 있어, 로더가 이 레이아웃을 가정합니다.
#   1. 재무상태표        (Balance Sheet)
#   2. 손익계산서        (Income Statement)
#   3. 현금흐름표        (Cash Flow Statement)
#   4. 자본변동표        (Statement of Changes in Equity)
#   5. 주석/기타         (Footnotes & Notes)
# ---------------------------------------------------------------------------

root: ${oc.env:BFD_TS2000_ROOT,./data/raw/ts2000}

files:
  balance_sheet: "bs_{year}.csv"
  income_statement: "is_{year}.csv"
  cash_flow: "cf_{year}.csv"
  equity_changes: "sce_{year}.csv"
  footnotes: "notes_{year}.csv"

# 공통 키 — 다섯 파일을 이 키로 조인합니다.
join_keys:
  - corp_code          # 종목코드 (KRX)
  - fiscal_year        # 회계연도
  - fiscal_quarter     # 4 = 연결 연간, 2 = 반기, 기타 분기
  - report_type        # "consolidated" | "separate"

# 결측/형변환 규칙
preprocessing:
  numeric_coercion: "strict"     # 단위 파싱 실패 시 에러
  unit_normalization: "KRW"      # 원 단위로 통일 (보고서에서 백만원/억원 섞여 들어오는 케이스 처리)
  drop_if_all_zero: true         # 모든 수치가 0인 행은 누락 간주
  encoding: "cp949"              # TS2000 export 기본값. 필요시 utf-8로 오버라이드

# 연도별 로드 범위
years:
  start: 2010
  end: 2024

# 시장 필터 — 시장별 로더가 각자 자기 파티션만 처리합니다.
markets:
  - KOSPI
  - KOSDAQ
  # - KONEX           # 유동성 낮아 초기 단계에서는 제외
