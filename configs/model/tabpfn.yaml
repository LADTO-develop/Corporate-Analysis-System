# ---------------------------------------------------------------------------
# TabPFN v2.5 설정
# 참고: https://github.com/PriorLabs/TabPFN
#
# API 패턴:
#   from tabpfn import TabPFNClassifier
#   from tabpfn.constants import ModelVersion
#   clf = TabPFNClassifier.create_default_for_version(ModelVersion.V2_5, ...)
# ---------------------------------------------------------------------------

model_version: "V2_5"                 # tabpfn.constants.ModelVersion enum 이름

# TabPFN은 기본 하이퍼파라미터가 이미 잘 튜닝되어 있음.
# 실험적 오버라이드가 필요한 경우에만 아래 값을 바꾸세요.
constructor_kwargs:
  device: "auto"                      # "cuda" | "cpu" | "auto" (CUDA 자동감지)
  random_state: 42
  n_estimators: 8                     # 앙상블 내부 tree 수
  softmax_temperature: 0.9
  balance_probabilities: false        # 우리는 sklearn calibration으로 따로 보정
  ignore_pretraining_limits: false    # true 설정 시 50k~100k 샘플까지 허용

# 체크포인트 — 기본값(real-data finetuned)이 대부분 케이스에 가장 좋음.
# 다른 variant를 쓰려면 huggingface.co/Prior-Labs/tabpfn_2_5 참고.
checkpoint: "default"                 # "default" | "variant" | "large-features-L" 등

# 대용량 테스트셋 처리 — 권장: 1000 샘플씩 배치.
inference:
  predict_batch_size: 1000
  # GPU 여유 있을 때 KV 캐시 활성화 (fit_mode='fit_with_cache')
  fit_mode: "fit_preprocessors"       # "fit_preprocessors" | "fit_with_cache"

# 전처리 — 중요: TabPFN은 raw 데이터를 선호하므로 scaling/one-hot 금지.
# 결측/카테고리 자동 처리에 맡김.
preprocessing:
  scale: false
  one_hot: false
