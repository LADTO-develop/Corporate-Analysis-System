# ---------------------------------------------------------------------------
# Explainable Boosting Machine (EBM) 설정
# 참고: https://interpret.ml/docs/python/api/ExplainableBoostingClassifier.html
#
# InterpretML EBM은 CPU 전용이며, outer_bags로 분산/불확실성을 추정합니다.
# ---------------------------------------------------------------------------

# 메인 효과 단계 (feature main effects)
max_bins: 1024
max_interaction_bins: 64

# Interaction terms — pairwise만 지원. 0.9 = 9할의 쌍 자동 탐색, 정수는 개수 지정.
interactions: 15

# Boosting 파라미터
learning_rate: 0.01
max_rounds: 25000                    # early stopping이 있어 실제로는 훨씬 적게 수렴
early_stopping_rounds: 50
early_stopping_tolerance: 1.0e-5

# Bagging — 불확실성 추정용 outer bags.
outer_bags: 8
inner_bags: 0                         # 0이면 비활성 (기본값)

# 트리 파라미터
min_samples_leaf: 4
max_leaves: 3                         # shallow가 해석성에 유리

# 검증 세트 비율 (early stopping용)
validation_size: 0.15

# 재현성
random_state: 42
n_jobs: -1                            # CPU 전체 사용
